<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acesso Liberado</title>

<style>

body{

margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#2b0033,#0d001a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;

}

.box{

width:90%;
max-width:420px;
padding:40px;
background:rgba(0,0,0,0.4);
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,120,0.4);

}

.badge{

background:linear-gradient(90deg,#ff0055,#ff6a00);
padding:7px 16px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:15px;
font-weight:bold;

}

h1{

font-size:28px;
margin-bottom:15px;
line-height:1.3;

}

p{

font-size:16px;
opacity:0.9;
margin-bottom:20px;

}

.highlight{

color:#ff2a8a;
font-weight:bold;

}

.btn{

display:block;
background:linear-gradient(90deg,#ff0055,#ff6a00);
padding:18px;
border-radius:40px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:17px;
margin-top:15px;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(255,0,120,0.7);
}

70%{
transform:scale(1.05);
box-shadow:0 0 25px 10px rgba(255,0,120,0);
}

100%{
transform:scale(1);
}

}

.small{

font-size:12px;
opacity:0.7;
margin-top:12px;

}

</style>

</head>

<body>

<div class="box">

<div class="badge">
ACESSO DISPONÍVEL
</div>

<h1>
Você está <span class="highlight">a um clique</span> de descobrir algo que poucas pessoas têm acesso…
</h1>

<p>
Quem encontrou esse canal secreto não consegue parar de voltar.
</p>

<p>
Se você chegou até aqui… provavelmente é porque <b>algo te trouxe até isso.</b>
</p>

<a class="btn" href="https://t.me/projetovenusvip_bot?start=bruxo">

DESBLOQUEAR ACESSO AGORA

</a>

<div class="small">
Entrar leva menos de 3 segundos
</div>

</div>

</body>

</html>
